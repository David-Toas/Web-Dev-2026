<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form</title>
  </head>
  <body>
    <center>
      <form
        action="/submit"
        method="POST"
        enctype="multipart/form-data"
        novalidate
      >
        <!-- Text input with label -->
        <label for="username">Full Name:</label>
        <input
          type="text"
          id="username"
          name="username"
          required
          placeholder="John Doe"
          minlength="2"
        />
        <br />

        <!-- Email -->
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required />
        <br />
        <!-- Password -->
        <label for="password">Password:</label>
        <input
          type="password"
          id="password"
          name="pwd"
          minlength="8"
          required
        />
        <br />
        <!-- Textarea -->
        <textarea
          name="message"
          rows="5"
          cols="40"
          required
          placeholder="Send your message here ....."
        ></textarea>
        <br />
        <!-- Select -->
        <label for="state">State:</label>
        <select name="state" id="state" style="background-color: aqua">
          <option value="option1">Lagos</option>
          <option value="option2">Anambra</option>
          <option value="option3">Abuja</option>
        </select>
        <br />
        <label for="gender">Gender:</label>
        <label for="male">Male <input type="checkbox" /></label>
        <label for="female">Female <input type="checkbox" /></label>
        <br />
        <br />
        <label for="skills">Skills:</label>
        <label for="skill1">HTML <input type="radio" /></label>
        <label for="skill2">CSS <input type="radio" /></label>
        <label for="skill3">JavaScript <input type="radio" /></label>
        <br />
        <label for="date">Date:</label>
        <input type="date" id="date" name="date" />
        <br />
        <label for="time">Time:</label>
        <input type="time" id="time" name="time" />
        <br />
        <label for="file">Upload File:</label>
        <input type="file" id="file" name="file" required />
        <br />
        <label for="search">Search:</label>
        <input type="search" id="search" name="search" />
        <br />

        <label for="range">Range:</label>
        <input type="range" id="range" name="range" min="0" max="100" />
        <br />
        <label for="color">Color:</label>
        <input type="color" id="color" name="color" />
        <br />
        <!-- Submit button -->
        <button type="submit">Send Message</button>
        <button type="reset">Clear Form</button>
      </form>
    </center>
  </body>
</html>
