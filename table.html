<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
  </head>
  <body>
    <table border="1">
      <caption>
        <b> Monthly Sales Report </b>
      </caption>
      <thead>
        <tr>
          <th>Month</th>
          <th>Sales</th>
          <th>Growth</th>
          <th>Month</th>
          <th>Sales</th>
          <th>Growth</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td rowspan="3">January</td>
          <td>$12,400</td>
          <td>+8%</td>
        </tr>
        <tr>
          <!-- <td>February</td> -->
          <td>$14,100</td>
          <td>+14%</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="3">Data from internal CRM system</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
